name: Build and Upload AlterTime News Addon

on:
  workflow_dispatch:
    inputs:
      force_upload:
        description: "Force package and CurseForge upload"
        required: false
        default: "false"
  schedule:
    - cron: "31 * * * *"

permissions:
  contents: write

env:
  DEBUG_CF: "false"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install Pillow beautifulsoup4

      - name: Debug CurseForge game versions
        if: env.DEBUG_CF == 'true'
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          python tools/list_curseforge_versions.py

      - name: Capture previous news signature
        run: |
          OLD_SIGNATURE=$(grep -E 'ns\.NewsSignature = ' Data/NewsData.lua | sed -E 's/.*"([^"]+)".*/\1/' || true)
          echo "OLD_NEWS_SIGNATURE=$OLD_SIGNATURE" >> $GITHUB_ENV
          echo "Old signature: $OLD_SIGNATURE"

      - name: Generate news from AlterTime homepage
        run: |
          python tools/rss_to_news.py \
            --homepage https://altertime.es/ \
            --output Data/NewsData.lua \
            --media-dir Media \
            --images \
            --limit 50 \
            --max-age-days 7

      - name: Check news signature changes
        env:
          FORCE_UPLOAD: ${{ github.event.inputs.force_upload || 'false' }}
        run: |
          NEW_SIGNATURE=$(grep -E 'ns\.NewsSignature = ' Data/NewsData.lua | sed -E 's/.*"([^"]+)".*/\1/' || true)
          echo "NEW_NEWS_SIGNATURE=$NEW_SIGNATURE" >> $GITHUB_ENV
          echo "New signature: $NEW_SIGNATURE"
          echo "Force upload: $FORCE_UPLOAD"

          if [ "$FORCE_UPLOAD" = "true" ]; then
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
            echo "Force upload enabled. Package and upload will continue."
          elif [ -z "$NEW_SIGNATURE" ]; then
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
            echo "No news signature found. Package and upload will continue."
          elif [ "$OLD_NEWS_SIGNATURE" = "$NEW_SIGNATURE" ]; then
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
            echo "No new articles detected. Skipping package and upload."
          else
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
            echo "New articles detected. Package and upload will continue."
          fi

      - name: Package addon
        if: env.HAS_CHANGES == 'true'
        run: |
          python tools/package_addon.py \
            --addon-dir . \
            --folder-name AltertimeAddon \
            --version "auto-${{ github.run_number }}"

      - name: Upload to CurseForge
        if: env.HAS_CHANGES == 'true'
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_PROJECT_ID: ${{ secrets.CF_PROJECT_ID }}
          CF_RELEASE_TYPE: beta
        run: |
          python tools/upload_curseforge.py

      - name: Commit generated content
        if: env.HAS_CHANGES == 'true'
        run: |
          git config user.name "AlterTime Bot"
          git config user.email "bot@altertime.es"
          git add Data Media AltertimeAddon.toc Core.lua
          git diff --cached --quiet || git commit -m "chore: update AlterTime news"
          git push

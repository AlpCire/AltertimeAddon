name: Build AlterTime News Addon

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install Pillow

      - name: Generate news from AlterTime homepage
        run: |
          python tools/rss_to_news.py \
            --homepage https://altertime.es/ \
            --output Data/NewsData.lua \
            --media-dir Media \
            --images \
            --limit 20 \
            --max-age-days 7

      - name: Package addon
        run: |
          python tools/package_addon.py \
            --addon-dir . \
            --folder-name AltertimeAddon \
            --version "auto-${{ github.run_number }}"

      - name: Commit generated content
        run: |
          git config user.name "AlterTime Bot"
          git config user.email "bot@altertime.es"
          git add Data Media dist AltertimeAddon.toc Core.lua
          git diff --cached --quiet || git commit -m "chore: update AlterTime news"
          git push

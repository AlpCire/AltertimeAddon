name: Build and Upload AlterTime News Addon

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

env:
  DEBUG_CF: "false"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install Pillow beautifulsoup4

      - name: Debug CurseForge game versions
        if: env.DEBUG_CF == 'true'
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          python tools/list_curseforge_versions.py

      - name: Generate news from AlterTime homepage
        run: |
          python tools/rss_to_news.py \
            --homepage https://altertime.es/ \
            --output Data/NewsData.lua \
            --media-dir Media \
            --images \
            --limit 50 \
            --max-age-days 7

      - name: Check generated changes
        run: |
          if git diff --quiet -- Data Media; then
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
            echo "No news changes detected. Skipping package and upload."
          else
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
            echo "News changes detected. Package and upload will continue."
          fi

      - name: Package addon
        if: env.HAS_CHANGES == 'true'
        run: |
          python tools/package_addon.py \
            --addon-dir . \
            --folder-name AltertimeAddon \
            --version "auto-${{ github.run_number }}"

      - name: Upload to CurseForge
        if: env.HAS_CHANGES == 'true'
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_PROJECT_ID: ${{ secrets.CF_PROJECT_ID }}
          CF_RELEASE_TYPE: beta
        run: |
          python tools/upload_curseforge.py

      - name: Commit generated content
        if: env.HAS_CHANGES == 'true'
        run: |
          git config user.name "AlterTime Bot"
          git config user.email "bot@altertime.es"
          git add Data Media AltertimeAddon.toc Core.lua
          git diff --cached --quiet || git commit -m "chore: update AlterTime news"
          git push
